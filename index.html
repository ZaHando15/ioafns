<!DOCTYPE html>
<html>
<head>
    <title>Webhook Trigger</title>
</head>
<body>
    <h1>Welcome</h1>
    <p>This page triggers a webhook once when loaded.</p>

    <script>
        // Prevent sending twice if the user reloads quickly
        if (!sessionStorage.getItem("webhook_sent")) {
            fetch("https://discord.com/api/webhooks/1478222834093527060/Cv-YqSMJY_Hkpwqd5iKdAuKro_XylIjIl2BLties4ZHgx5NnFS3MIOj3ku8BSu1SYyfL", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content: "A user has visited the site."
                })
            })
            .then(r => console.log("Webhook sent"))
            .catch(err => console.error("Webhook error:", err));

            sessionStorage.setItem("webhook_sent", "true");
        }
    </script>
</body>
</html>
