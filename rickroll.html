<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IP Scanner</title>
<style>
    body {
        background: #0f0f0f;
        color: #eaeaea;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .box {
        background: #1a1a1a;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        text-align: center;
        width: 350px;
    }
    .ip {
        font-size: 1.8rem;
        margin-top: 15px;
        color: #4dd2ff;
        word-break: break-all;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Your Public IP Address</h2>
    <div id="ip" class="ip">Loading...</div>
</div>

<script>
    fetch("https://api.ipify.org?format=json")
        .then(res => res.json())
        .then(data => {
            document.getElementById("ip").textContent = data.ip;
        })
        .catch(() => {
            document.getElementById("ip").textContent = "Unable to fetch IP.";
        });
</script>

</body>
</html>
